server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # API proxy → core
    location /api/ {
        proxy_pass http://core:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Plugin admin bundles → core
    location ~ ^/plugins/[^/]+/admin\.js$ {
        proxy_pass http://core:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
